name: Deploy Multiple mdBooks
on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        book_dir: ["doc/workflow", "doc/glow_sg13g2"]        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable        

      - name: Cache mdbook-mermaid
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook-mermaid
          key: ${{ runner.os }}-mdbook-mermaid

      - name: Install mdbook-mermaid
        run: |
          if ! command -v mdbook-mermaid &> /dev/null; then
            cargo install mdbook-mermaid
          fi

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build mdBook
        run: |
          cd ${{ matrix.book_dir }}
          mdbook-mermaid install .
          mdbook build

      - name: Deploy Landing Page to Root
        if: matrix.book_dir == 'doc/workflow'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc  
          keep_files: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ matrix.book_dir }}/book
          destination_dir: ${{ matrix.book_dir }}
          keep_files: true
