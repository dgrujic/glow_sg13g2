name: Deploy Multiple mdBooks
on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Define the directories for each of your mdBooks
        book_dir: [doc/workflow]
    steps:
      - name: Checkout repository
        uses: [actions/checkout@v4](https://github.com)

      - name: Setup mdBook
        uses: [peaceiris/actions-mdbook@v2](https://github.com/marketplace/actions/mdbook-action)
        with:
          mdbook-version: 'latest'

      - name: Build mdBook
        run: |
          cd ${{ matrix.book_dir }}
          mdbook build

      - name: Deploy to GitHub Pages
        uses: [peaceiris/actions-gh-pages@v3](https://github.com)
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ matrix.book_dir }}/book
          # Deploys each book to its own subdirectory on the gh-pages branch
          destination_dir: ${{ matrix.book_dir }}
          keep_files: true # Important: prevents one book from deleting others
